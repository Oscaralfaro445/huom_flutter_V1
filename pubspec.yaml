name: huom
description: HUOM - Tu mascota virtual, tu mundo pixel
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Motor de juego
  flame: ^1.18.0

  # State management
  flutter_riverpod: ^2.5.0

  # Base de datos local (Hive)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Navegación
  go_router: ^14.1.4

  # Inyección de dependencias
  get_it: ^7.7.0

  # Firebase
  firebase_core: ^3.3.0
  firebase_analytics: ^11.2.1
  firebase_crashlytics: ^4.0.4
  firebase_messaging: ^15.0.4

  # Notificaciones locales
  flutter_local_notifications: ^17.2.1+2

  # Audio
  flame_audio: ^2.10.0

  # Utilidades
  uuid: ^4.4.2
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.12
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sprites/
    - assets/audio/sfx/
    - assets/audio/music/
  fonts:
    - family: PressStart2P
      fonts:
        - asset: assets/fonts/PressStart2P-Regular.ttf
